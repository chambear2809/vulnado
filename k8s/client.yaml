apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnado-client
  labels:
    app.kubernetes.io/name: vulnado-client
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: vulnado
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vulnado-client
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vulnado-client
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: vulnado
    spec:
      containers:
        - name: client
          image: vulnado-client
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /login.html
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /login.html
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vulnado-client
  labels:
    app.kubernetes.io/name: vulnado-client
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: vulnado
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vulnado-client
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: http
