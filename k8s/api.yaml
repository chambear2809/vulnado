apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnado-api
  labels:
    app.kubernetes.io/name: vulnado-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: vulnado
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vulnado-api
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vulnado-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: vulnado
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until pg_isready -h db -p 5432 -U postgres; do sleep 2; done
      containers:
        - name: api
          image: vulnado-api
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: vulnado-config
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: vulnado-postgres
                  key: postgres-password
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vulnado-api
  labels:
    app.kubernetes.io/name: vulnado-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: vulnado
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vulnado-api
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8080
      targetPort: http
